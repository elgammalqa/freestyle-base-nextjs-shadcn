name: CI

# Fast build gate that blocks the "broken template merges to main" failure
# mode. Every PR + every push to main runs the same checks the live sandbox
# runs during scaffold preflight, so a regression is caught before the
# snapshot rotation workflow ever bakes it.
#
# Checks:
#   1. `npm ci` — exercises the postinstall codegen hook; generated dirs
#      must materialize or we fail here.
#   2. `npm run typecheck` — catches missing re-exports, wrong types, etc.
#   3. `npm test` — vitest unit tests (validateJsonBody, CSRF middleware).
#   4. `npm run build` — compiles with `next.config.ts`'s ignoreBuildErrors
#      and ignoreDuringBuilds removed, so TS + lint errors now fail the
#      build instead of silently shipping.
#   5. `npm run dev` boot + `/api/healthz` smoke against a REAL postgres
#      service container (so the DB-ping healthz exercises a live DB).
#   6. `/api/buildra/selftest` structural checks — ensures the generated
#      code is loadable and `db/schema/tables` exports are intact.

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build + typecheck + test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # Dummy URL so `lib/db.ts`'s top-level neon(env.DATABASE_URL) doesn't
      # throw at module load. CI does not touch the real DB during
      # build/typecheck/test — only code resolution and compilation matter
      # here. The smoke job below uses a real postgres service.
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: npm ci (runs postinstall codegen)
        run: npm ci

      - name: Verify codegen output materialized
        run: |
          set -e
          test -f lib/api-client/generated/api.ts || { echo "::error::lib/api-client/generated/api.ts missing after npm ci — postinstall codegen did not run"; exit 1; }
          test -f lib/api-zod/generated/zod.ts || { echo "::error::lib/api-zod/generated/zod.ts missing after npm ci — postinstall codegen did not run"; exit 1; }
          echo "::notice::codegen output materialized via postinstall"

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build (TS + lint gated)
        run: npm run build

  smoke:
    name: Dev-server smoke + selftest
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Push schema to ephemeral postgres
        run: npx drizzle-kit push --config drizzle.config.ts

      - name: Start dev server in background
        run: |
          nohup npm run dev > dev-server.log 2>&1 &
          echo $! > dev-server.pid
          echo "Dev server PID: $(cat dev-server.pid)"

      - name: Wait for /api/healthz
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:3000/api/healthz > /dev/null 2>&1; then
              echo "::notice::dev server healthy after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::dev server never responded to /api/healthz within 60s"
          tail -n 100 dev-server.log
          exit 1

      - name: healthz smoke (db ping)
        run: |
          RESPONSE=$(curl -sS http://localhost:3000/api/healthz)
          echo "healthz response: $RESPONSE"
          # The improved healthz returns {"status":"ok","db":"ok",...}.
          # If the DB ping fails it returns 503 with status:degraded.
          echo "$RESPONSE" | grep -q '"status":"ok"' || {
            echo "::error::healthz did not return status:ok — DB ping or route handler failed";
            exit 1;
          }
          echo "$RESPONSE" | grep -q '"db":"ok"' || {
            echo "::error::healthz returned status:ok but db:ok was not present";
            exit 1;
          }

      - name: CRUD smoke (POST + PATCH + DELETE customer)
        run: |
          set -e
          # POST a customer
          CREATE_RESPONSE=$(curl -sS -X POST http://localhost:3000/api/customers \
            -H "Origin: http://localhost:3000" \
            -H "Content-Type: application/json" \
            -d '{"name":"CI Smoke","email":"ci@smoke.test"}')
          echo "POST response: $CREATE_RESPONSE"
          ID=$(echo "$CREATE_RESPONSE" | node -e 'process.stdout.write(String(JSON.parse(require("fs").readFileSync(0,"utf8")).id ?? ""))')
          if [ -z "$ID" ]; then echo "::error::POST did not return an id"; exit 1; fi
          # PATCH
          curl -sS -X PATCH "http://localhost:3000/api/customers/$ID" \
            -H "Origin: http://localhost:3000" \
            -H "Content-Type: application/json" \
            -d '{"name":"CI Smoke (patched)"}' | grep -q '"name":"CI Smoke (patched)"' \
            || { echo "::error::PATCH did not update name"; exit 1; }
          # DELETE
          STATUS=$(curl -sS -o /dev/null -w "%{http_code}" -X DELETE \
            -H "Origin: http://localhost:3000" \
            "http://localhost:3000/api/customers/$ID")
          if [ "$STATUS" != "204" ]; then echo "::error::DELETE returned $STATUS, expected 204"; exit 1; fi
          echo "::notice::CRUD lifecycle PASSED"

      - name: selftest structural checks
        run: |
          curl -sS http://localhost:3000/api/buildra/selftest -o selftest.json || true
          echo "selftest response:"
          cat selftest.json
          echo
          node -e '
            const raw = require("fs").readFileSync("selftest.json", "utf8");
            let payload;
            try { payload = JSON.parse(raw); } catch (err) {
              console.error("::error::selftest did not return JSON:", err.message);
              console.error("raw body:", raw.slice(0, 500));
              process.exit(1);
            }
            const required = new Set([
              "lib/api-client/generated loadable",
              "lib/api-zod/generated loadable",
              "db/schema/tables exports intact",
            ]);
            const failed = (payload.checks ?? []).filter(
              (c) => required.has(c.name) && !c.ok,
            );
            if (failed.length > 0) {
              console.error("::error::structural selftest checks failed:");
              for (const c of failed) {
                console.error("  - " + c.name + ": " + (c.detail ?? "(no detail)"));
              }
              process.exit(1);
            }
            console.log("all structural selftest checks passed");
          '

      - name: Dump dev-server log on failure
        if: failure()
        run: |
          echo "--- dev-server.log ---"
          tail -n 200 dev-server.log || true

      - name: Stop dev server
        if: always()
        run: |
          if [ -f dev-server.pid ]; then
            kill "$(cat dev-server.pid)" 2>/dev/null || true
          fi
