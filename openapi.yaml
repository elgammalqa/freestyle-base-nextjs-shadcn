openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification — edit this file to add/change endpoints, then run `npm run codegen`.
servers:
  - url: /api
    description: Base API path
tags:
  - name: health

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthStatus" }

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]
